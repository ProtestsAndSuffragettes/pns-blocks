name: Quality

on:
    push:
        branches:
            - main
    pull_request:

permissions:
    contents: read

jobs:
    quality:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 11.5.2

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Check PHP syntax
              run: find . -path './node_modules' -prune -o -path './vendor' -prune -o -type f -name '*.php' -exec php -l {} \;

            - name: Check source and rebuild assets
              run: pnpm check

            - name: Verify generated assets are committed
              run: git diff --exit-code -- build/blocks
